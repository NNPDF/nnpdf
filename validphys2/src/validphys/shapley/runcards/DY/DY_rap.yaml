#
# Experiment layout
# -----------------
#   x-scan : 5 log-spaced mu values covering [1e-4, 0.5], alpha=-1.0
#            -> produces phi_j(x) Shapley density on the full global fit
#
# sigma is fixed in log10(x) units (xspace: logx) so the bump width is
# constant in decades across the full x range.

pdf_name: NNPDF40_nnlo_as_01180
theory_id: 708
use_cuts: internal
n_replicas: 100
output_root: sv_results/DY_rap
log_root: slurm/logs/DY_rap
run_name: xscan_DY_other
enforce_sumrules: true
per_replica: true
deterministic_sign_symmetrized: true
random_sign: false
stabilization:
  enabled: true
  action: exclude_dataset
  dataset_delta_chi2_threshold: 1e6
  max_outlier_coalitions: 5
  rerun_stable: true
experiments:

  # --- x-scan 

  - name:  1e-4
    basis: [flavor]
    perturbation:
      mu: 0.0001
      sigma: 0.2      
      amplitude:  1.0   
      mode: calibrated
      xspace: logx

  - name:  1e-3
    basis: [flavor]
    perturbation:
      mu: 0.001
      sigma: 0.3       
      amplitude:  1.0
      mode: calibrated
      xspace: logx

  - name:  1e-2
    basis: [flavor]
    perturbation:
      mu: 0.01
      sigma: 0.3      
      amplitude:  1.0
      mode: calibrated
      xspace: logx

  - name:  1e-1
    basis: [flavor]
    perturbation:
      mu: 0.1
      sigma: 0.3       
      amplitude:  1.0
      mode: calibrated
      xspace: logx

  - name:  5e-1
    basis: [flavor]
    perturbation:
      mu: 0.5
      sigma: 0.2       
      amplitude:  1.0
      mode: calibrated
      xspace: logx
  - name:  8e-1
    basis: [flavor]
    perturbation:
      mu: 0.8
      sigma: 0.2       
      amplitude:  1.0
      mode: calibrated
      xspace: logx

datasets:

  - {dataset: CDF_Z0_1P96TEV_ZRAP, variant: legacy}
  - {dataset: D0_Z0_1P96TEV_ZRAP, variant: legacy}
  # DY: ATLAS
  - {dataset: ATLAS_WPWM_7TEV_36PB_ETA, variant: legacy}
  - {dataset: ATLAS_Z0_7TEV_36PB_ETA, variant: legacy}
  - {dataset: ATLAS_WPWM_7TEV_46FB_CC-ETA, variant: legacy}
  - {dataset: ATLAS_Z0_7TEV_46FB_CC-Y, variant: legacy}
  - {dataset: ATLAS_Z0_7TEV_46FB_CF-Y, variant: legacy}
  - {dataset: ATLAS_Z0_8TEV_HIMASS_M-Y, variant: legacy}
  - {dataset: ATLAS_Z0_8TEV_LOWMASS_M-Y, variant: legacy}
  # DY: CMS
  - {dataset: CMS_WPWM_8TEV_MUON_Y, variant: legacy}
  # DY: LHCb
  - LHCB_Z0_7TEV_DIELECTRON_Y
  - LHCB_Z0_8TEV_DIELECTRON_Y
  - {dataset: LHCB_WPWM_7TEV_MUON_Y, cfac: [NRM]}
  - {dataset: LHCB_Z0_7TEV_MUON_Y, cfac: [NRM]}
  - {dataset: LHCB_WPWM_8TEV_MUON_Y, cfac: [NRM]}
  - {dataset: LHCB_Z0_8TEV_MUON_Y, cfac: [NRM]}
  - LHCB_Z0_13TEV_DIMUON-Y
  - LHCB_Z0_13TEV_DIELECTRON-Y