# A single CI script with github workflow.
name: Automatic Fit

# start job only for PRs when a label is added.
on:
  pull_request:
    types: [labeled]

# some general variables
env:
  N3FIT_MAXNREP: 30 # total number of replicas to fit
  POSTFIT_NREP: 15 # requested minimum replicas for postfit
  # IMPORTANT
  # WHEN CHANGING THE REFERENCE SET, THE NEW REFERENCE MUST BE MANUALLY UPLOADED TO THE SERVER
  REFERENCE_SET: NNBOT-1ff92b662-2026-07-01
  STABLE_REFERENCE_SET: NNBOT-1ff92b662-2026-07-01
  PYTHONHASHSEED: "0"

jobs:
  fitbot:
    # perform build only if PR has run-fit-bot label
    if: contains(github.event.pull_request.labels.*.name, 'run-fit-bot')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-tags: true
        fetch-depth: 0
    # Install the software with pip, from conda only LHAPDF/pandoc/pip
    - uses: ./.github/actions/install_conda_pip
    # Create the fit runcard taking the commit hash
    - name: Preparing fit runcard
      run: |
        # set runcard name
        export COMMIT=`git rev-parse --short HEAD`
        export TIMESTAMP=`date --iso-8601`
        echo "RUNCARD=NNBOT-$COMMIT-$TIMESTAMP" >> $GITHUB_ENV
        echo "RUNFOLDER=n3fit/runcards/examples" >> $GITHUB_ENV
    # Run vp-setupfit: download theory, t0 and eko
    - name: Fit setup
      shell: bash -l {0}
      run: |
        cd $RUNFOLDER
        cp developing.yml $RUNCARD.yml
        vp-setupfit $RUNCARD.yml
    # Run n3fit in parallel, this is ok for the 30 replicas we want
    - name: Running n3fit
      shell: bash -l {0}
      run: |
        cd $RUNFOLDER
        n3fit $RUNCARD.yml 1 -r $N3FIT_MAXNREP
    # Evolve the fit
    - name: Running dglap
      shell: bash -l {0}
      run: |
        cd $RUNFOLDER
        evolven3fit evolve $RUNCARD
    # Run postfit and keep the fit as an artifact
    - name: Postfit and upload fit
      shell: bash -l {0}
      run: |
        cd $RUNFOLDER
        postfit $POSTFIT_NREP $RUNCARD --at-least-nrep
        ln -s ${PWD}/${RUNCARD} ${CONDA_PREFIX}/share/NNPDF/results
        tar -czf ${RUNCARD}.tar.gz ${RUNCARD}
        echo "PATH_TO_SAVE=${PWD}/${RUNCARD}.tar.gz" >> ${GITHUB_ENV}
    - name: Keep the fit as an artifact
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.RUNCARD }}.tar.gz
        path: ${{ env.PATH_TO_SAVE }}
    # Generate the report and upload it to the server
    - name: Install SSH key
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.NNPDF_SSA }}
        name: id_rsa
        known_hosts: ${{ secrets.NNPDF_HOSTS_KEY }}
    - name: Building and upload report
      shell: bash -l {0}
      run: |
        vp-comparefits $RUNCARD $REFERENCE_SET \
                    --title "Automatic check fit $RUNCARD" \
                    --author bot \
                    --keywords run-fit-bot \
                    --thcovmat_if_present
        url=$(vp-upload output/ 2>&1 | grep https)
        echo "REPORT_URL=$url" >> $GITHUB_ENV
        vp-comparefits $RUNCARD $STABLE_REFERENCE_SET \
                     --title "Automatic check fit $RUNCARD with respect to latest tag" \
                     --author bot \
                     --keywords run-fit-bot \
                     --thcovmat_if_present \
                     -o tagged_output
         url=$(vp-upload tagged_output/ 2>&1 | grep https)
         echo "REPORT_URL_STABLE=$url" >> $GITHUB_ENV
    # write reminder
    - name: Write summary on PR
      uses: unsplash/comment-on-pr@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        msg: |
          Greetings from your nice fit :robot: !
          I have good news for you, I just finished my tasks:
            - Fit Name: ${{ env.RUNCARD }}
            - Fit Report wrt master: ${{ env.REPORT_URL }}
            - Fit Report wrt latest stable reference: ${{ env.REPORT_URL_STABLE }}
            - Fit Data: fit data is kept as an artifact. Please, remember to upload it to the server if the reference is changed.

          Check the report **carefully**, and please  buy me a :coffee: , or better, a GPU :wink:!
