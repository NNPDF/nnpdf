setname: "ATLAS_Z0J_13TEV_PT"

version: 2

version_comment: "This version fixes a bug and extends the implementation version 1. The bug is as follows: In the previous version two HepData tables were used, separately for the central value and for the uncetainties (Tables 26 and 5, respectively). However, it was not realised that the two differ for th ebin normalisation, which is, on average, of 2 GeV. Uncertainties were therefore a factor of 2 smaller on average. The extension is as follows: in the previous version only a subset of pT bins were implemented. The full pT spectrum is now implemented.The bugged version, used for the pheno paper, is used as a variant called v1."

# References
arXiv:
  url: "https://arxiv.org/pdf/1912.02844.pdf"
iNSPIRE:
  url: "https://inspirehep.net/literature/1768911"
hepdata:
  url: "https://www.hepdata.net/record/ins1768911"
  version: 3

nnpdf_metadata:
  nnpdf31_process: "DY NC"
  experiment: "ATLAS"

implemented_observables:
- observable_name: "LL"
  observable:
    description: "ATLAS 13 TeV, transverse momentum distribution of Drell-Yan lepton pairs."
    label: r"$1/\sigma_{fid}d\\sigma/dp_{T}^{\\l\\l}$"
    units: "[1/GeV]"

  ndata: 41

  tables: [5]
  process_type: DY_NC_PT

  plotting:
    dataset_label: 'ATLAS 13 TeV normalized differential cross section in $pT_{ll}$'
    x_scale: log
    plot_x: pT

  kinematic_coverage: [pT, m_ll2]

  kinematics:
    variables:
      pT: {description: "lepton pair transverse momentum", label: '$p_T$', units: ""}
      m_ll2: {description: "lepton pair invariant mass squared", label: '$m_{\ell\ell}^2$', units: "GeV2"}

    file: kinematics.yaml

  data_central: data.yaml
  data_uncertainties:
  - uncertainties.yaml
  variants:
    v1:
      data_central: data_v1.yaml
      data_uncertainties:
      - uncertainties_v1.yaml
      #kinematic_coverage: [pT, m_Z2, sqrts]
      #kinematics:
      #  variables:
      #    pT: {description: "lepton pair transverse momentum", label: '$p_T$', units: ""}
      #    m_Z2: {description: "lepton pair invariant mass squared", label: '$m_{\ell\ell}^2$', units: "GeV2"}
      #    sqrts: {description: "center-of-mass energy", label: '$\sqrt{s}$', units: "GeV"}
      #  file: kinematics_v1.yaml

  # Theory
  theory:
    #shifts:
    #  ATLAS_Z0J_13TEV_PT_LL: 9
    FK_tables:
    - - ATLAS_Z0J_13TEV_PT_LL
    - - ATLAS_Z0_13TEV_TOT
    operation: 'ratio'

